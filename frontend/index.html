<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🎓 AI Study Assistant</h2>

        <label>Provider</label>
        <select id="provider">
            <option>Ollama</option>
            <option>OpenAI</option>
        </select>

        <label>API Key</label>
        <input
            type="password"
            id="apiKey"
            placeholder="Enter API Key"
        >
    </div>

    <div class="main">

        <h1>AI Study Assistant</h1>

        <!-- Ask AI -->
        <section class="card">
            <h2>Ask AI</h2>

            <textarea
                id="prompt"
                placeholder="Ask anything..."
            ></textarea>

            <button onclick="askAI()">
                Ask AI
            </button>

            <div id="response"></div>
        </section>

        <!-- Upload PDF -->
        <section class="card">
            <h2>Upload PDF</h2>

            <input
                type="file"
                id="pdfFile"
                accept=".pdf"
            >

            <button onclick="uploadPDF()">
                Upload PDF
            </button>

            <div id="uploadResult"></div>
        </section>

        <!-- Ask Document -->
        <section class="card">
            <h2>Ask Uploaded Document</h2>

            <textarea
                id="documentQuestion"
                placeholder="Ask about the uploaded PDF..."
            ></textarea>

            <button onclick="askDocument()">
                Ask Document
            </button>

            <div id="documentResponse"></div>
        </section>

        <!-- Generate Quiz -->
        <section class="card">
            <h2>Generate Quiz</h2>

            <input
                type="text"
                id="quizTopic"
                placeholder="Enter topic (e.g. Momentum)"
            >

            <button onclick="generateQuiz()">
                Generate Quiz
            </button>

            <div id="quizResult"></div>
        </section>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
