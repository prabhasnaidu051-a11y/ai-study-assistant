stages:
  - lint
  - format
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - pip install -r backend/requirements.txt
  - pip install ruff mypy bandit pytest pytest-cov

lint:
  stage: lint
  script:
    - ruff check .

format:
  stage: format
  script:
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - mypy backend

test:
  stage: test
  script:
    - pytest

coverage:
  stage: coverage
  script:
    - pytest --cov=backend
